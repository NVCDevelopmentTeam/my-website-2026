<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <script>
      ;(function () {
        try {
          var THEME_KEY = 'theme'
          var cachedTheme = null

          // Get theme with simple in-memory caching
          function getTheme() {
            // Return cached value if already resolved
            if (cachedTheme !== null) return cachedTheme

            var t = localStorage.getItem(THEME_KEY)

            // Fallback to system preference if no theme is stored
            if (!t) {
              if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                t = 'dark'
              } else {
                t = 'light'
              }
            }

            // Cache the result to avoid repeated localStorage reads
            cachedTheme = t
            return t
          }

          // Apply theme class to <html> element
          function applyTheme() {
            var theme = getTheme()

            if (theme === 'dark') {
              document.documentElement.classList.add('dark')
            } else {
              document.documentElement.classList.remove('dark')
            }
          }

          // Defer execution to avoid hydration/layout issues
          setTimeout(applyTheme, 0)
        } catch (e) {
          // Fail silently but log for debugging
          console.error('Theme error:', e)
        }
      })()
    </script>
    %sveltekit.head%
  </head>

  <body
    data-sveltekit-preload-data="hover"
    data-sveltekit-preload-code="eager"
    class="bg-white dark:bg-gray-950"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
